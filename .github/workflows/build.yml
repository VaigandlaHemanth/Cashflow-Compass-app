name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      # Real errors only (syntax + undefined names) — not style nits.
      - name: Lint (pyflakes-style errors)
        run: ruff check --select E9,F63,F7,F82 --exclude libs .

      # Byte-compile every module to catch syntax errors (skips vendored libs/).
      - name: Byte-compile
        run: python -m compileall -q . -x libs
